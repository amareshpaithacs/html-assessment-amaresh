    <h2 align="center">Contact Me</h2>
    <p align="center">Feel free to reach out to me using the form below.</p>

    <br>

    <table border="1" align="center" cellpadding="12" width="60%" bgcolor="#ffffff">

        <tr>
            <td colspan="2" bgcolor="lightblue" align="center">
                <h3>Send Me a Message</h3>
            </td>
        </tr>

        <tr>
            <td><label for="name"><b>Full Name:</b></label></td>
            <td><input type="text" id="name" name="name" placeholder="Enter your full name" size="35"></td>
        </tr>

        <tr>
            <td><label for="email"><b>Email Address:</b></label></td>
            <td><input type="email" id="email" name="email" placeholder="Enter your email" size="35"></td>
        </tr>

        <tr>
            <td><label for="phone"><b>Phone Number:</b></label></td>
            <td><input type="tel" id="phone" name="phone" placeholder="Enter your phone number" size="35"></td>
        </tr>

        <tr>
            <td><label for="subject"><b>Subject:</b></label></td>
            <td>
                <select id="subject" name="subject" size="1">
                    <option value="">-- Select a Subject --</option>
                    <option value="internship">Internship Opportunity</option>
                    <option value="project">Project Collaboration</option>
                    <option value="freelance">Freelance Work</option>
                    <option value="feedback">Feedback</option>
                    <option value="other">Other</option>
                </select>
            </td>
        </tr>

        <tr>
            <td valign="top"><label for="message"><b>Message:</b></label></td>
            <td>
                <textarea id="message" name="message" rows="6" cols="35" placeholder="Write your message here..."></textarea>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center" bgcolor="#e0ffe0">
                <input type="submit" value="Send Message">
                &nbsp;&nbsp;
                <input type="reset" value="Clear Form">
            </td>
        </tr>

    </table>
