    <h2 align="center">Contact Me</h2>

    <table border="1" align="center" cellpadding="12" width="60%" bgcolor="#ffffff">

        <tr>
            <td colspan="2" bgcolor="lightblue" align="center">
                <b>Send Me a Message</b>
            </td>
        </tr>

        <tr>
            <td><label for="name"><b>Full Name:</b></label></td>
            <td><input type="text" id="name" name="name" placeholder="Your full name" size="30"></td>
        </tr>

        <tr>
            <td><label for="email"><b>Email:</b></label></td>
            <td><input type="email" id="email" name="email" placeholder="Your email" size="30"></td>
        </tr>

        <tr>
            <td><label for="phone"><b>Phone:</b></label></td>
            <td><input type="tel" id="phone" name="phone" placeholder="Your phone number" size="30"></td>
        </tr>

        <tr>
            <td><label for="subject"><b>Subject:</b></label></td>
            <td>
                <select id="subject" name="subject">
                    <option value="">-- Select --</option>
                    <option value="internship">Internship</option>
                    <option value="project">Project</option>
                    <option value="collaboration">Collaboration</option>
                    <option value="other">Other</option>
                </select>
            </td>
        </tr>

        <tr>
            <td valign="top"><label for="message"><b>Message:</b></label></td>
            <td><textarea id="message" name="message" rows="5" cols="30" placeholder="Write your message here"></textarea></td>
        </tr>

        <tr>
            <td colspan="2" align="center" bgcolor="#e0ffe0">
                <input type="submit" value="Send Message">
                &nbsp;
                <input type="reset" value="Clear">
            </td>
        </tr>

    </table>
